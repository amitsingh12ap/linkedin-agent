<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Regenerating post...</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
    .card { background: white; border-radius: 16px; padding: 40px; max-width: 420px;
            width: 90%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a2e; margin: 0 0 8px; }
    p  { color: #555; font-size: 15px; line-height: 1.5; margin: 0; }
    .spinner { border: 3px solid #e0e0e0; border-top: 3px solid #f6ad55;
               border-radius: 50%; width: 36px; height: 36px;
               animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success { color: #b7791f; }
    .error   { color: #d73a49; }
  </style>
</head>
<body>
<div class="card">
  <div id="spinner" class="spinner"></div>
  <div id="icon" class="icon" style="display:none"></div>
  <h1 id="title">Generating a fresh post...</h1>
  <p id="msg">Asking Claude for a different angle. A new WhatsApp preview is on its way.</p>
</div>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const pat    = params.get("pat");
  const repo   = params.get("repo") || "amitsingh12ap/linkedin-agent";

  const spinner = document.getElementById("spinner");
  const icon    = document.getElementById("icon");
  const title   = document.getElementById("title");
  const msg     = document.getElementById("msg");

  if (!pat) {
    spinner.style.display = "none";
    icon.style.display = "block"; icon.textContent = "❌";
    title.textContent = "Invalid link";
    msg.textContent   = "This regenerate link is invalid or expired.";
    return;
  }

  try {
    const res = await fetch(
      `https://api.github.com/repos/${repo}/actions/workflows/post-regenerate.yml/dispatches`,
      {
        method: "POST",
        headers: {
          Authorization: `Bearer ${pat}`,
          Accept: "application/vnd.github+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ ref: "main" }),
      }
    );

    spinner.style.display = "none";
    icon.style.display    = "block";

    if (res.status === 204) {
      icon.textContent  = "🔄";
      title.className   = "success";
      title.textContent = "Fresh post incoming!";
      msg.textContent   = "Claude is writing a different angle. You'll get a new WhatsApp in ~30 seconds.";
    } else {
      const err = await res.json().catch(() => ({}));
      icon.textContent  = "⚠️";
      title.className   = "error";
      title.textContent = "Something went wrong";
      msg.textContent   = err.message || `GitHub API returned ${res.status}.`;
    }
  } catch (e) {
    spinner.style.display = "none";
    icon.style.display    = "block"; icon.textContent = "❌";
    title.className   = "error";
    title.textContent = "Network error";
    msg.textContent   = e.message;
  }
})();
</script>
</body>
</html>
