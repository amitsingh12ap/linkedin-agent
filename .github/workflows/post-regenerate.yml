name: Post Regenerate

on:
  workflow_dispatch:   # triggered by the regenerate link

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Regenerate draft & send new WhatsApp
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:   ${{ secrets.LINKEDIN_PERSON_URN }}
          TWILIO_ACCOUNT_SID:    ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:     ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM:  ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO:           ${{ secrets.WHATSAPP_TO }}
          GITHUB_PAT:            ${{ secrets.GH_PAT }}
          GITHUB_REPO:           amitsingh12ap/linkedin-agent
          DB_PATH: ./data/agent.json
          MODE: regenerate
        run: node src/run-once.js

      - name: Commit updated state
        run: |
          git config user.name "linkedin-agent[bot]"
          git config user.email "linkedin-agent@users.noreply.github.com"
          git add data/agent.json
          git diff --staged --quiet || git commit -m "chore: regenerated draft $(date +'%Y-%m-%d %H:%M')"
          git push
