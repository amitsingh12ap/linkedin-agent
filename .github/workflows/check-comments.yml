name: Check Comments

on:
  schedule:
    - cron: '0 4,8,12 * * 1-5'   # Mon-Fri at 9:30AM, 1:30PM, 5:30PM IST
  workflow_dispatch:

jobs:
  check-comments:
    runs-on: ubuntu-latest
    steps:
      - name: Ping webhook server
        run: |
          curl -s -X POST "${{ secrets.WEBHOOK_SERVER_URL }}/webhook/comments" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 10 || echo "Server ping done"
