name: Check Comments

on:
  schedule:
    # Mon–Fri at 11:00 AM, 3:00 PM, 6:00 PM IST (5:30, 9:30, 12:30 UTC)
    # Staggered at :30 to avoid colliding with other :00 workflows
    - cron: '30 5,9,12 * * 1-5'
  workflow_dispatch:

jobs:
  check-comments:
    runs-on: ubuntu-latest
    steps:
      - name: Ping webhook server
        run: |
          curl -s -X POST "${{ secrets.WEBHOOK_SERVER_URL }}/webhook/comments" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 10 || echo "Server ping done (server may not be set up yet)"
