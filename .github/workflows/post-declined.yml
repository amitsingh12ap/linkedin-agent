name: Post Declined

on:
  workflow_dispatch:   # triggered by the decline link

jobs:
  decline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clear declined draft
        env:
          DB_PATH: ./data/agent.json
          MODE: decline
        run: node src/run-once.js

      - name: Commit updated state
        run: |
          git config user.name "linkedin-agent[bot]"
          git config user.email "linkedin-agent@users.noreply.github.com"
          git add data/agent.json
          git diff --staged --quiet || git commit -m "chore: declined draft $(date +'%Y-%m-%d')"
          git push
