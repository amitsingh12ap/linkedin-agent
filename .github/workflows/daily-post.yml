name: Daily LinkedIn Post

on:
  schedule:
    # Run every hour between 2:30 AM – 8:30 AM UTC (8 AM – 2 PM IST).
    # The script itself randomly picks ONE hour in that window to actually post.
    # It also randomly skips ~2 days per week — so posting looks organic, not bot-like.
    - cron: '30 2-8 * * *'

  # Allow manual trigger from GitHub UI for testing
  workflow_dispatch:
    inputs:
      theme:
        description: 'Override theme (optional)'
        required: false
        type: choice
        options:
          - auto
          - engineering-leadership
          - ai-productivity
          - streaming-tech
          - personal-growth
        default: auto

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data/agent.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run LinkedIn Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          DB_PATH: ./data/agent.json
          THEME_OVERRIDE: ${{ github.event.inputs.theme }}
        run: node src/run-once.js

      - name: Commit updated post history
        run: |
          git config user.name "linkedin-agent[bot]"
          git config user.email "linkedin-agent@users.noreply.github.com"
          git add data/agent.json
          git diff --staged --quiet || git commit -m "chore: agent state $(date +'%Y-%m-%d %H:%M')"
          git push
