name: Daily LinkedIn Draft

on:
  schedule:
    # Runs every hour 8 AM–2 PM IST (2:30–8:30 AM UTC).
    # Script internally picks one random hour in that window to generate + send WhatsApp approval.
    - cron: '30 2-8 * * *'

  workflow_dispatch:
    inputs:
      theme:
        description: 'Override theme (optional)'
        required: false
        type: choice
        options:
          - auto
          - engineering-leadership
          - ai-productivity
          - streaming-tech
          - personal-growth
        default: auto

jobs:
  draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate draft & send WhatsApp approval
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:    ${{ secrets.LINKEDIN_PERSON_URN }}
          TWILIO_ACCOUNT_SID:     ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:      ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM:   ${{ secrets.TWILIO_WHATSAPP_FROM }}
          WHATSAPP_TO:            ${{ secrets.WHATSAPP_TO }}
          GITHUB_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_REPO:            amitsingh12ap/linkedin-agent
          DB_PATH: ./data/agent.json
          MODE: draft
          THEME_OVERRIDE: ${{ github.event.inputs.theme }}
        run: node src/run-once.js

      - name: Commit updated state
        run: |
          git config user.name "linkedin-agent[bot]"
          git config user.email "linkedin-agent@users.noreply.github.com"
          git add data/agent.json
          git diff --staged --quiet || git commit -m "chore: draft state $(date +'%Y-%m-%d %H:%M')"
          git push
